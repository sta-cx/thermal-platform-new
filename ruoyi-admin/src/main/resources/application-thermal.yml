--- # 供热平台专属配置
thermal:
  # MBus 阀门控制中间件地址
  mbus:
    url: http://127.0.0.1/middle/property/heatreading/operation

  # 旧系统数据库配置（用于数据迁移时的数据读取）
  legacy:
    enabled: true
    datasource:
      driverClassName: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/rltk_pro?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      username: root
      password: root

  # IoT 配置（中国电信 AG SDK）
  iot:
    enabled: false  # 迁移到第四阶段时启用
    ag:
      server-url:
      app-id:
      app-secret:

  # 阿里云 OSS
  oss:
    enabled: false  # 迁移到第四阶段时启用
    endpoint:
    access-key-id:
    access-key-secret:
    bucket-name:

  # 阿里云短信
  sms:
    enabled: false
    access-key-id:
    access-key-secret:

  # 微信支付
  wechat:
    enabled: false  # 迁移到第四阶段时启用
    app-id:
    mch-id:
    api-key:
    cert-path:

  # 微信小程序
  mini-program:
    app-id:
    app-secret:

  # 微信公众号
  official-account:
    app-id:
    app-secret:
    token:
    aes-key:

  # 旧系统 Sa-Token 兼容配置
  sa-token:
    # 旧系统 token 名称
    legacy-token-name: satoken
    # JWT 密钥（与旧系统保持一致，迁移期兼容）
    jwt-secret-key: sdkj2024

--- # 动态数据源 — 旧系统读取（数据迁移用）
# 注意：此数据源仅用于数据迁移阶段，生产环境应禁用
spring:
  datasource:
    dynamic:
      datasource:
        # 旧系统数据源 - 用于读取 rltk_pro 库数据
        legacy:
          lazy: true
          type: com.zaxxer.hikari.HikariDataSource
          driverClassName: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/rltk_pro?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
          username: root
          password: root
