--- # 动态数据源 — 旧系统读取（数据迁移用）
# 注意：此数据源仅用于数据迁移阶段，生产环境应禁用
spring:
  datasource:
    dynamic:
      datasource:
        # 旧系统数据源 - 用于读取 rltk_pro 库数据
        legacy:
          lazy: true
          type: com.zaxxer.hikari.HikariDataSource
          driverClassName: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/rltk_pro?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
          username: root
          password: root

--- # ============== Spring AI ==============
# 模型 API key 必须通过环境变量 SDKJ_AI_DEEPSEEK_KEY 注入,不要硬编码
spring:
  ai:
    openai:
      api-key: ${SDKJ_AI_DEEPSEEK_KEY:[REMOVED]}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3
      # embedding 由 EmbeddingConfig.java 手动创建 bean，不复用 chat base-url
      # DeepSeek 不提供 embedding API，使用 Silicon Flow
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always   # 启动时自动建表(AI_CHAT_MEMORY / AI_CHAT_MEMORY_MESSAGES)
    vectorstore:
      qdrant:
        host: 192.168.2.206
        port: 6334            # gRPC port (HTTP is 6333)
        use-tls: false
        api-key: ${SDKJ_AI_QDRANT_KEY:}   # no auth currently, empty
        initialize-schema: false           # we manage collection lifecycle ourselves
        collection-name: sdkj_kb_default   # default, actual queries use per-tenant collection

# ============== AI 业务配置 ==============
thermal:
  ai:
    enabled: true
    default-model: deepseek-chat
    contextual:
      cache-default-ttl: 5m
      max-tokens: 4000
      fallback-to-generic: true
    circuit-breaker:
      failure-threshold: 5
      window-seconds: 60
      open-duration-seconds: 60
    embedding:
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SDKJ_AI_SILICONFLOW_KEY:sk-nmaivhfaojupkrwqfrdhegxuigdudsjgwpeymxmcaoljicas}
      model: BAAI/bge-large-zh-v1.5
    rate-limit:
      contextual-per-user-per-minute: 30
      contextual-per-tenant-per-minute: 200
    audit:
      log-context: true
      log-output: true
      pii-mask-patterns:
        # 身份证(末位可为 X/x),前后必须非数字边界,避免在长串里乱命中
        - '(?<!\d)\d{17}[\dXx](?!\d)'
        # 国内手机号(13x-19x),边界同上
        - '(?<!\d)1[3-9]\d{9}(?!\d)'
    kb:
      chunk-size-tokens: 500
      chunk-overlap-tokens: 50
      max-doc-bytes: 5242880     # 5MB
      max-chunks-per-doc: 2000
      retrieval:
        top-k: 4
        score-threshold: 0.7
