--- # 供热平台专属配置
thermal:
  # 采集平台配置
  collect:
    ipPort: 127.0.0.1:8081
    username: ${COLLECT_USERNAME:admin}
    password: ${COLLECT_PASSWORD:}

  # MBus 阀门控制中间件地址
  mbus:
    url: http://127.0.0.1/middle/property/heatreading/operation

  # IoT 配置（中国电信 AG SDK）
  iot:
    enabled: false  # 迁移到第四阶段时启用
    ag:
      server-url:
      app-id:
      app-secret:

  # 阿里云 OSS
  oss:
    enabled: false  # 迁移到第四阶段时启用
    endpoint:
    access-key-id:
    access-key-secret:
    bucket-name:

  # 阿里云短信
  sms:
    enabled: false
    access-key-id:
    access-key-secret:

  # 旧系统 Sa-Token 兼容配置
  sa-token:
    # 旧系统 token 名称
    legacy-token-name: satoken
    # JWT 密钥（与旧系统保持一致，迁移期兼容）
    jwt-secret-key: ${SA_TOKEN_JWT_SECRET:your-jwt-secret-here}

--- # ============== Spring AI ==============
# 模型 API key 必须通过环境变量 SDKJ_AI_DEEPSEEK_KEY 注入,不要硬编码
spring:
  ai:
    openai:
      api-key: ${SDKJ_AI_DEEPSEEK_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3
      # embedding 由 EmbeddingConfig.java 手动创建 bean，不复用 chat base-url
      # DeepSeek 不提供 embedding API，使用 Jina AI
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always   # 启动时自动建表(AI_CHAT_MEMORY / AI_CHAT_MEMORY_MESSAGES)
    vectorstore:
      qdrant:
        host: 192.168.2.206
        port: 6334            # gRPC port (6333 is HTTP REST)
        use-tls: false
        api-key: ${SDKJ_AI_QDRANT_KEY:}   # no auth currently, empty
        initialize-schema: false           # we manage collection lifecycle ourselves
        collection-name: sdkj_kb_default   # default, actual queries use per-tenant collection

# ============== AI 业务配置 ==============
thermal:
  ai:
    enabled: true
    default-model: deepseek-chat
    contextual:
      cache-default-ttl: 5m
      max-tokens: 4000
      fallback-to-generic: true
    circuit-breaker:
      failure-threshold: 5
      window-seconds: 60
      open-duration-seconds: 60
    embedding:
      base-url: https://api.jina.ai
      api-key: ${SDKJ_AI_JINA_KEY:}
      model: jina-embeddings-v3
      task:
        query: retrieval.query
        passage: retrieval.passage
    rate-limit:
      contextual-per-user-per-minute: 30
      contextual-per-tenant-per-minute: 200
    audit:
      log-context: true
      log-output: true
      pii-mask-patterns:
        # 身份证(末位可为 X/x),前后必须非数字边界,避免在长串里乱命中
        - '(?<!\d)\d{17}[\dXx](?!\d)'
        # 国内手机号(13x-19x),边界同上
        - '(?<!\d)1[3-9]\d{9}(?!\d)'
    kb:
      chunk-size-tokens: 500
      chunk-overlap-tokens: 50
      max-doc-bytes: 5242880     # 5MB
      max-chunks-per-doc: 2000
      retrieval:
        top-k: 4
        score-threshold: 0.5
    tools:
      disabled: []                              # 例: [valveControlTool]
      write-rate-limit-per-minute: 10
      valve:
        dry-run: true                           # IoT 就绪后改 false
    rag:
      enabled: true
      hybrid:
        enabled: true
        dense-prefetch-limit: 20
        sparse-prefetch-limit: 20
        fusion-limit: 10
      rerank:
        enabled: true
        model: jina-reranker-v2-base-multilingual
        base-url: https://api.jina.ai
        api-key: ${SDKJ_AI_JINA_KEY:}
        timeout-ms: 5000
        score-threshold: 0.3
        fallback-on-error: true
      upload:
        max-files-per-batch: 50
        max-size-mb: 200
        jina-embed-batch-size: 128
        allowed-extensions:
          - .txt
          - .md
          - .markdown
          - .text
          - .rtf
          - .doc
          - .docx
          - .ppt
          - .pptx
          - .xls
          - .xlsx
          - .odt
          - .ods
          - .odp
          - .pdf
          - .html
          - .htm
          - .xml
          - .csv
          - .tsv
          - .json
          - .eml
          - .msg

# ============== pr_data_grant 墓碑清理 ==============
sdkj:
  data-grant-cleanup:
    enabled: true                  # 总开关,false 则完全不跑(应急止血用)
    retention-days: 30             # 多少天前的墓碑算可删
    batch-size: 500                # 单批 DELETE 行数上限
    max-delete-per-run: 5000       # 全租户合计待删上限,超过整个 Job 跳过 + WARN
    cron: "0 30 3 * * ?"           # 每天 3:30(错开 AiLogCleanupJob 的 3:00)
